<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category一覧</title>
  </head>
  <body>
    <h1>Category一覧</h1>
    <table border="1">
      <thead>
        <tr>
          <th>科目名</th>
          <th>種別</th>
        </tr>
      </thead>
      <tbody>
        {% for category in categories %}
        <tr>
          <td>{{ category.name }}</td>
          <td>{{ category.get_type_display }}</td>
        </tr>
        {% empty %}
        <tr>
          <td colspan="2">データがありません</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </body>
</html>
